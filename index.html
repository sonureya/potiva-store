<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potiva Store | Premium Traditional Utensils</title>
    <!-- Google Fonts for Luxury Branding -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cinzel:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #5c320f;
            --primary-light: #724216;
            --accent: #b8860b;
            --accent-light: #dfb13c;
            --bg: #fbf9f4;
            --text: #2c2520;
            --text-muted: #61554d;
            --white: #ffffff;
            --whatsapp: #25D366;
            --whatsapp-hover: #128C7E;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            line-height: 1.6;
        }

        /* Top Announcement Bar */
        .announcement-bar {
            background-color: var(--accent);
            color: var(--white);
            text-align: center;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Views Layout Control */
        .view-section { width: 100%; display: block; }
        #category-page-view { display: none; } /* Chhupa rahega jab tak click na ho */

        /* Hero Header (Homepage Only) */
        header { 
            background: linear-gradient(rgba(44, 23, 6, 0.82), rgba(92, 50, 15, 0.92)), 
                        url('https://unsplash.com') no-repeat center/cover;
            color: var(--white); 
            text-align: center; 
            padding: 6rem 1.5rem; 
            border-bottom: 4px solid var(--accent);
        }

        header h1 { 
            font-family: 'Cinzel', serif;
            font-size: 3.5rem; 
            font-weight: 700; 
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        .legacy-tag {
            display: inline-block;
            border: 1px solid var(--accent-light);
            padding: 0.4rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            color: var(--accent-light);
            border-radius: 4px;
        }

        header p { 
            font-size: 1.2rem; 
            max-width: 750px;
            margin: 0 auto;
            opacity: 0.95; 
            font-style: italic;
        }

        .section-title { 
            text-align: center; 
            margin: 4rem 0 2rem 0; 
            color: var(--primary); 
            font-family: 'Cinzel', serif;
            font-size: 2.2rem; 
            font-weight: 700;
        }

        .section-title::after { 
            content: ''; 
            display: block; 
            width: 70px; 
            height: 3px; 
            background: var(--accent); 
            margin: 10px auto 0 auto; 
            border-radius: 2px; 
        }

        /* Homepage Categories Grid Blocks */
        .category-grid {
            max-width: 1100px;
            margin: 0 auto 4rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
        }

        .category-card {
            background: var(--white);
            border: 2px solid #ebdcc5;
            border-radius: 16px;
            padding: 3.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(114,66,22,0.04);
            transition: all 0.3s ease;
            color: var(--text);
        }

        .category-card:hover {
            border-color: var(--accent);
            background-color: var(--primary);
            color: var(--white);
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(114,66,22,0.15);
        }

        .category-card h2 {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            margin-bottom: 0.8rem;
        }

        .category-card p {
            font-size: 0.95rem;
            opacity: 0.8;
        }

        /* Category Page Specific Elements */
        .category-header-bar {
            background-color: var(--primary);
            color: var(--white);
            padding: 2.5rem 1rem;
            text-align: center;
            border-bottom: 4px solid var(--accent);
            position: relative;
        }

        .category-header-bar h2 {
            font-family: 'Cinzel', serif;
            font-size: 2.4rem;
            letter-spacing: 1px;
        }

        .back-btn {
            display: inline-block;
            margin-top: 1rem;
            background-color: transparent;
            color: var(--accent-light);
            border: 1px solid var(--accent-light);
            padding: 0.5rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background-color: var(--accent-light);
            color: var(--primary);
        }

        /* Products Grid Layout Frame */
        .container { 
            max-width: 1200px; 
            margin: 3rem auto; 
            padding: 0 1rem; 
            display: flex; 
            flex-wrap: wrap; 
            gap: 2.5rem; 
            justify-content: center; 
        }

        .product-card { 
            background: var(--white); 
            border: 1px solid #ebdcc5; 
            border-radius: 16px; 
            width: 290px; 
            overflow: hidden; 
            box-shadow: 0 6px 12px rgba(114,66,22,0.04); 
            text-align: center; 
            display: none; /* Controlled dynamically by JavaScript */
            flex-direction: column; 
            justify-content: space-between; 
            transition: transform 0.3s, box-shadow 0.3s; 
        }

        .product-card:hover { 
            transform: translateY(-5px); 
            box-shadow: 0 12px 24px rgba(114,66,22,0.09); 
        }

        .product-img { 
            width: 100%; 
            height: 220px; 
            object-fit: cover; 
            border-bottom: 1px solid #ebdcc5; 
            background-color: #f5ece1; 
        }

        .product-info { 
            padding: 1.5rem; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
        }

        .product-card h3 { 
            color: var(--primary); 
            margin-top: 0; 
            font-size: 1.3rem; 
            margin-bottom: 0.5rem; 
        }

        .product-card p { 
            font-size: 0.95rem; 
            color: var(--text-muted); 
            line-height: 1.5; 
            margin-bottom: 1.5rem; 
        }

        .price-tag { 
            font-size: 1.4rem; 
            font-weight: 700; 
            color: var(--accent); 
            margin-bottom: 1.2rem; 
            display: block; 
            line-height: 1.2; 
        }
        
        .btn-box { display: flex; flex-direction: column; gap: 0.5rem; }
        
        .buy-btn { 
            background-color: var(--whatsapp); 
            color: var(--white); 
            text-align: center; 
            padding: 0.8rem 1rem; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            text-decoration: none; 
            display: block; 
            font-size: 1rem; 
            box-shadow: 0 3px 6px rgba(37,211,102,0.15); 
        }

        .buy-btn:hover { background-color: var(--whatsapp-hover); }
        
        .qr-btn { 
            background-color: var(--primary-light); 
            color: var(--white); 
            text-align: center; 
            padding: 0.5rem 1rem; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            text-decoration: none; 
            display: block; 
            font-size: 0.85rem; 
            cursor: pointer; 
        }

        /* QR Modal Screen */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.6); align-items: center; justify-content: center; }
        .modal-content { background-color: var(--white); padding: 2rem; border-radius: 12px; text-align: center; max-width: 90%; width: 320px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .modal-content img { width: 200px; height: 200px; margin: 1rem 0; }
        .close-btn { background-color: #333; color: var(--white); border: none; padding: 0.5rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 1rem; }

        footer { background-color: #1e1915; color: #a89e95; text-align: center; padding: 4rem 1.5rem; font-size: 0.95rem; border-top: 4px solid var(--primary); }
        footer p { margin: 0.4rem 0; }
        footer strong { color: var(--white); }

        @media (max-width: 600px) {
            header h1 { font-size: 2.3rem; }
            header p { font-size: 1rem; }
            .category-header-bar h2 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

<!-- MAIN VIEW: HOMEPAGE SCREEN -->
<div id="homepage-view" class="view-section">
    <div class="announcement-bar">
        ✨ PURE TRADITIONAL ARTISAN CRAFTSMANSHIP SINCE 2000
    </div>
