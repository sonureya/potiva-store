<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potiva Store | Premium Traditional Utensils & Gift Items</title>
    <!-- Google Fonts for Luxury Typography -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Cinzel:wght@600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #5c320f;
            --primary-light: #724216;
            --accent: #b8860b;
            --accent-light: #dfb13c;
            --bg: #fbf9f4;
            --text: #2c2520;
            --text-muted: #61554d;
            --white: #ffffff;
            --whatsapp: #25D366;
            --whatsapp-hover: #128C7E;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            line-height: 1.6;
        }

        /* Top Announcement Bar */
        .announcement-bar {
            background-color: var(--accent);
            color: var(--white);
            text-align: center;
            padding: 0.6rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Luxury Hero Header */
        header { 
            background: linear-gradient(rgba(44, 23, 6, 0.85), rgba(92, 50, 15, 0.95)), 
                        url('https://unsplash.com') no-repeat center/cover;
            color: var(--white); 
            text-align: center; 
            padding: 5rem 1.5rem; 
            border-bottom: 4px solid var(--accent);
        }

        header h1 { 
            font-family: 'Cinzel', serif;
            font-size: 3.5rem; 
            font-weight: 700; 
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
        }

        header p { 
            font-size: 1.25rem; 
            max-width: 700px;
            margin: 0 auto 2rem auto;
            opacity: 0.9; 
            font-weight: 400;
        }

        .cta-header-btn {
            display: inline-block;
            background-color: var(--accent);
            color: var(--white);
            text-decoration: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .cta-header-btn:hover {
            background-color: var(--white);
            color: var(--primary);
            transform: translateY(-2px);
        }

        /* Trust Badges Section */
        .trust-section {
            background: var(--white);
            padding: 2rem 1rem;
            box-shadow: 0 4px 20px rgba(92,50,15,0.03);
            border-bottom: 1px solid #ebdcc5;
        }

        .trust-container {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .trust-item {
            text-align: center;
            flex: 1;
            min-width: 240px;
        }

        .trust-item h4 {
            color: var(--primary);
            font-size: 1.1rem;
            margin-bottom: 0.2rem;
        }

        .trust-item p {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Showcase Section Frame */
        .section-title { 
            text-align: center; 
            margin: 4rem 0 2rem 0; 
            color: var(--primary); 
            font-family: 'Cinzel', serif;
            font-size: 2.2rem; 
            font-weight: 700;
        }

        .section-title::after { 
            content: ''; 
            display: block; 
            width: 80px; 
            height: 3px; 
            background: var(--accent); 
            margin: 12px auto 0 auto; 
            border-radius: 2px; 
        }

        /* Product Cards Grid Layout */
        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 0 1.5rem 5rem 1.5rem; 
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2.5rem;
        }

        .product-card { 
            background: var(--white); 
            border: 1px solid #f0e4d4; 
            border-radius: 16px; 
            overflow: hidden; 
            box-shadow: 0 10px 30px rgba(92, 50, 15, 0.04); 
            display: flex; 
            flex-direction: column; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .product-card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 15px 35px rgba(92, 50, 15, 0.1); 
            border-color: var(--accent);
        }

        .image-container {
            width: 100%;
            height: 240px;
            overflow: hidden;
            background-color: #f7f3ed;
            position: relative;
        }

        .product-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            transition: transform 0.5s ease;
        }

        .product-card:hover .product-img {
            transform: scale(1.06);
        }

        /* Premium Tag */
        .badge {
            position: absolute;
            top: 1rem;
            left: 1rem;
            background-color: rgba(92, 50, 15, 0.85);
            color: var(--white);
            padding: 0.3rem 0.8rem;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
            z-index: 10;
        }

        .product-info { 
            padding: 1.8rem; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
        }

        .product-card h3 { 
            color: var(--primary); 
            font-size: 1.35rem; 
            margin-bottom: 0.6rem;
            font-weight: 700;
        }

        .product-card p { 
            font-size: 0.95rem; 
            color: var(--text-muted); 
            line-height: 1.6; 
            margin-bottom: 1.8rem; 
        }

        .price-box {
            margin-bottom: 1.2rem;
            border-top: 1px dashed #ebdcc5;
            padding-top: 1rem;
        }

        .price-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
        }

        .price-tag { 
            font-size: 1.6rem; 
            font-weight: 700; 
            color: var(--accent); 
            display: inline-block;
        }
        
        .price-unit {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        /* Order Buttons */
        .buy-btn { 
            background-color: var(--whatsapp); 
            color: var(--white); 
            text-align: center; 
            padding: 0.9rem 1.5rem; 
            border: none; 
            border-radius: 10px; 
            font-weight: 700; 
            text-decoration: none; 
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1rem; 
            transition: background-color 0.2s, transform 0.2s; 
            box-shadow: 0 4px 12px rgba(37,211,102,0.25); 
        }

        .buy-btn:hover { 
            background-color: var(--whatsapp-hover); 
            transform: scale(1.02);
        }

        /* Global Floating Action Button */
        .floating-wa {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background-color: var(--whatsapp);
            color: var(--white);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            text-decoration: none;
            font-size: 1.8rem;
            z-index: 1000;
            transition: all 0.3s ease;
        }

        .floating-wa:hover {
            background-color: var(--whatsapp-hover);
            transform: scale(1.1) rotate(10deg);
        }

        /* Premium Footer Area */
        footer { 
            background-color: #1e1915; 
            color: #a89e95; 
            text-align: center; 
            padding: 4rem 1.5rem; 
            font-size: 0.95rem; 
            border-top: 4px solid var(--primary);
            margin-top: 4rem;
        }

        footer p { margin: 0.5rem 0; }
        footer strong { color: var(--white); }
        
        .footer-highlight {
            color: var(--accent-light);
            font-weight: 600;
        }

        /* Responsive Settings */
        @media (max-width: 600px) {
            header h1 { font-size: 2.4rem; }
            header p { font-size: 1.1rem; }
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="announcement-bar">
    ✨ Premium Traditional Craftsmanship Delivered Straight To Your Home
</div>

<header>
    <h1>Potiva Store</h1>
